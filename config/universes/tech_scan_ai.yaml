promotion_rules:
  scan_to_watchlist:
  - 连续2个交易日强于同类ETF
  - 与当前持仓方向高度相关
  - 成为市场主线
  - 对当前持仓有强验证意义
  - 用户明确要求跟踪
  watchlist_to_candidate:
  - 行情稳定且可参考
  - 方向强于同类
  - 有明确买入触发条件
  - 不违反QDII溢价、承接确认、失败试错禁补等硬规则
  - 不是因为卖飞后悔或亏损补仓
  candidate_to_operation:
  - 下周可能直接交易
  - 数据可稳定获取
  - 需要输出分时/涨跌/VWAP/关键中枢
  - 可用于强执行判断
  operation_downgrade:
  - 数据长期不稳定
  - 不再可能交易
  - 只用于强弱验证
  - QDII溢价长期过高
  - 个股事件仓未获用户授权
  - 失败观察仓且禁补禁T
  scan_not_trading_signal: true
