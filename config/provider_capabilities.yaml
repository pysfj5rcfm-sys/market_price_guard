akshare:
  fund_etf_spot_em:
    provider: akshare
    function_name: fund_etf_spot_em
    asset_types: [ETF, QDII_ETF, A_SHARE_ETF]
    operation_fit: conditional
    notes: "Operation fit still depends on quote_trust_tier, strict, freshness, and provider health."
    fields:
      last_price: {status: supported, unit: price, unit_confidence: high, comparable_across_providers: true, operation_fit: conditional, reference_fit: true}
      prev_close: {status: supported, unit: price, unit_confidence: medium, comparable_across_providers: true, operation_fit: conditional, reference_fit: true}
      open_price: {status: supported, unit: price, unit_confidence: medium, comparable_across_providers: true, operation_fit: conditional, reference_fit: true}
      high_price: {status: supported, unit: price, unit_confidence: medium, comparable_across_providers: true, operation_fit: conditional, reference_fit: true}
      low_price: {status: supported, unit: price, unit_confidence: medium, comparable_across_providers: true, operation_fit: conditional, reference_fit: true}
      volume: {status: supported_raw_unit, unit: raw_provider_unit, unit_confidence: low, comparable_across_providers: false, operation_fit: diagnostic_only, reference_fit: true}
      amount: {status: supported_unit_unknown, unit: unit_unknown, unit_confidence: unknown, comparable_across_providers: false, operation_fit: diagnostic_only, reference_fit: true}
      price_change: {status: supported_or_calculable, unit: price, unit_confidence: medium, comparable_across_providers: true, operation_fit: diagnostic_only, reference_fit: true}
      price_change_pct: {status: supported_or_calculable, unit: percent_value, unit_confidence: medium, comparable_across_providers: true, operation_fit: diagnostic_only, reference_fit: true}
      amplitude_pct: {status: calculable, unit: percent_value, unit_confidence: medium, comparable_across_providers: true, operation_fit: diagnostic_only, reference_fit: true}
      bid1_price: {status: not_validated, unit: price, unit_confidence: unknown, comparable_across_providers: false, operation_fit: no, reference_fit: false}
      ask1_price: {status: not_validated, unit: price, unit_confidence: unknown, comparable_across_providers: false, operation_fit: no, reference_fit: false}
      turnover_rate: {status: not_validated, unit: percent_value, unit_confidence: unknown, comparable_across_providers: false, operation_fit: no, reference_fit: false}
      minute_bars: {status: not_implemented, unit: not_applicable, unit_confidence: not_applicable, comparable_across_providers: false, operation_fit: no, reference_fit: false}
      intraday_vwap: {status: not_implemented, unit: not_applicable, unit_confidence: not_applicable, comparable_across_providers: false, operation_fit: no, reference_fit: false}
      iopv: {status: missing, unit: price, unit_confidence: unknown, comparable_across_providers: false, operation_fit: no, reference_fit: false}
      premium_pct: {status: missing, unit: percent_value, unit_confidence: unknown, comparable_across_providers: false, operation_fit: no, reference_fit: false}
  stock_spot_em:
    provider: akshare
    function_name: stock_spot_em
    asset_types: [A_SHARE, HK_STOCK]
    operation_fit: conditional
    notes: "A/H stock endpoint availability is environment-dependent."
    fields:
      last_price: {status: supported, unit: price, unit_confidence: medium, comparable_across_providers: true, operation_fit: conditional, reference_fit: true}
      volume: {status: supported_raw_unit, unit: raw_provider_unit, unit_confidence: low, comparable_across_providers: false, operation_fit: diagnostic_only, reference_fit: true}
      amount: {status: supported_unit_unknown, unit: unit_unknown, unit_confidence: unknown, comparable_across_providers: false, operation_fit: diagnostic_only, reference_fit: true}
      bid1_price: {status: not_validated, operation_fit: no, reference_fit: false}
      ask1_price: {status: not_validated, operation_fit: no, reference_fit: false}
      turnover_rate: {status: not_validated, operation_fit: no, reference_fit: false}
      minute_bars: {status: not_implemented, operation_fit: no, reference_fit: false}
  fund_etf_hist_min_em:
    provider: akshare
    function_name: fund_etf_hist_min_em
    asset_types: [ETF, QDII_ETF, A_SHARE_ETF]
    operation_fit: diagnostic_only
    notes: "ETF minute bars probe via AKShare; does not upgrade operation readiness."
    fields:
      minute_bars: {status: supported_if_endpoint_succeeds, unit: raw_provider_unit, unit_confidence: low, comparable_across_providers: false, operation_fit: diagnostic_only, reference_fit: true}
      minute_bar_interval: {status: supported_if_endpoint_succeeds, unit: not_applicable, operation_fit: diagnostic_only, reference_fit: true}
      intraday_vwap: {status: not_implemented, operation_fit: no, reference_fit: false}
