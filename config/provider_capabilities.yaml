      minute_bar_interval: {status: supported_if_endpoint_succeeds, operation_fit: no, reference_fit: true}
      intraday_vwap: {status: not_implemented, operation_fit: no, reference_fit: false}
      iopv: {status: missing, operation_fit: no, reference_fit: false}
