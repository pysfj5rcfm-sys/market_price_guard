yfinance:
  ticker_quote:
    provider: yfinance
    function_name: ticker_quote
    asset_types: [ETF, HK_STOCK, A_SHARE, A_SHARE_ETF, INDEX]
    operation_fit: reference_only
    notes: "Open-source Yahoo Finance wrapper; not an official exchange feed."
    fields:
      last_price: {status: supported, unit: price, unit_confidence: medium, comparable_across_providers: true, operation_fit: reference_only, reference_fit: true}
      prev_close: {status: provider_dependent, unit: price, unit_confidence: medium, comparable_across_providers: true, operation_fit: reference_only, reference_fit: true}
      open_price: {status: provider_dependent, unit: price, unit_confidence: medium, comparable_across_providers: true, operation_fit: reference_only, reference_fit: true}
      high_price: {status: provider_dependent, unit: price, unit_confidence: medium, comparable_across_providers: true, operation_fit: reference_only, reference_fit: true}
      low_price: {status: provider_dependent, unit: price, unit_confidence: medium, comparable_across_providers: true, operation_fit: reference_only, reference_fit: true}
      volume: {status: supported_raw_unit, unit: raw_provider_unit, unit_confidence: low, comparable_across_providers: false, operation_fit: reference_only, reference_fit: true}
      amount: {status: missing, unit: not_applicable, unit_confidence: not_applicable, comparable_across_providers: false, operation_fit: no, reference_fit: false}
      bid1_price: {status: missing_or_not_validated, operation_fit: no, reference_fit: false}
      ask1_price: {status: missing_or_not_validated, operation_fit: no, reference_fit: false}
      turnover_rate: {status: missing, operation_fit: no, reference_fit: false}
      minute_bars: {status: attempted_reference_fallback, unit: raw_provider_unit, unit_confidence: low, comparable_across_providers: false, operation_fit: no, reference_fit: true, validation_status: provider_dependent, notes: "YFinance intraday bars are attempted only as reference fallback after AKShare and Eastmoney minute probes fail; ranges are limited and do not upgrade operation."}
      intraday_vwap: {status: not_implemented, operation_fit: no, reference_fit: false}
      iopv: {status: missing, operation_fit: no, reference_fit: false}
      premium_pct: {status: missing, operation_fit: no, reference_fit: false}
